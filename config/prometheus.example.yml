# Prometheus Configuration Example for TailSentry
# Copy to /etc/prometheus/prometheus.yml or docker volume

global:
  # Scrape configuration
  scrape_interval: 15s              # How often to scrape targets
  evaluation_interval: 15s          # How often to evaluate alert rules
  
  # Attach labels to all time series
  external_labels:
    monitor: 'tailsentry-monitor'
    environment: 'production'
    team: 'operations'

# Alertmanager configuration (optional)
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - 'alertmanager:9093'

# Load rules files
rule_files:
  - 'alert_rules.yml'
  # - 'custom_rules.yml'

scrape_configs:
  # ====== TailSentry Primary Instance ======
  - job_name: 'tailsentry'
    
    # Metrics endpoint configuration
    scrape_interval: 30s                    # Scrape every 30 seconds
    scrape_timeout: 10s                     # Wait 10 seconds for response
    metrics_path: '/metrics'                # Path to metrics endpoint
    scheme: 'http'                          # Use http (or 'https')
    
    # Static targets
    static_configs:
      - targets: ['localhost:8080']
        labels:
          instance: 'tailsentry-primary'
          location: 'primary-site'
    
    # Optional: Service discovery
    # consul_sd_configs:
    #   - server: 'localhost:8500'
    #     datacenter: 'dc1'
    #     tags: ['tailsentry']
    
    # Optional: Basic authentication
    # basic_auth:
    #   username: 'prometheus_user'
    #   password: 'prometheus_password'
    
    # Optional: Bearer token authentication
    # bearer_token: 'your_bearer_token'
    # bearer_token_file: '/etc/prometheus/bearer_token'
    
    # TLS configuration (if using HTTPS)
    # tls_config:
    #   ca_file: '/etc/prometheus/ca.crt'
    #   cert_file: '/etc/prometheus/client.crt'
    #   key_file: '/etc/prometheus/client.key'
    #   insecure_skip_verify: false
    
    # Relabel configuration
    relabel_configs:
      # Keep all metrics
      - source_labels: [__scheme__, __address__, __metrics_path__]
        separator: ';'
        regex: '(.*);(.*);(.*)'
        target_label: __param_target
        replacement: '${1}://${2}${3}'
        action: replace
      
      # Add instance label
      - source_labels: [__address__]
        target_label: instance
        replacement: 'tailsentry-primary'
    
    # Dropped metrics (optimization - reduce cardinality)
    # metric_relabel_configs:
    #   - source_labels: [__name__]
    #     regex: 'go_.*'
    #     action: drop

  # ====== TailSentry Standby Instance (Optional) ======
  - job_name: 'tailsentry-standby'
    
    static_configs:
      - targets: ['tailsentry-standby.company.com:8080']
        labels:
          instance: 'tailsentry-standby'
          location: 'standby-site'
    
    scrape_interval: 30s
    scrape_timeout: 10s

  # ====== Prometheus Self-Monitoring ======
  - job_name: 'prometheus'
    
    static_configs:
      - targets: ['localhost:9090']
        labels:
          instance: 'prometheus'
    
    scrape_interval: 15s

  # ====== Node Exporter (Linux Host Metrics) ======
  # Uncomment if monitoring system-level metrics
  - job_name: 'node'
    
    static_configs:
      - targets: ['localhost:9100']
        labels:
          hostname: 'tailsentry-server'
    
    scrape_interval: 30s

  # ====== Blackbox Exporter (Endpoint Checks) ======
  # Uncomment for synthetic monitoring (uptime checks)
  # - job_name: 'blackbox'
  #   
  #   static_configs:
  #     - targets:
  #       - 'http://tailsentry.company.com/health'
  #   
  #   metrics_path: /probe
  #   params:
  #     module: [http_2xx]
  #   scrape_interval: 60s

  # ====== Docker Metrics (if using Docker) ====== 
  # Uncomment if monitoring via Docker containers
  # - job_name: 'docker'
  #   
  #   static_configs:
  #     - targets: ['localhost:9323']
  #   
  #   scrape_interval: 30s

